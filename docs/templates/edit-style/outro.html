<!doctype html>
<!--
  Template: outro.html
  Variáveis substituídas pelo hyperframes-render.sh:
    {{QUOTE}}        ex: We do not see the world as it is.
    {{ATTRIBUTION}}  ex: — Anonymous, 1962
    {{CREDIT_1}}     ex: @ConfesionesdelasAbuelas
    {{CREDIT_2}}     ex: 2026
    {{DURATION}}, {{FG}}, {{FG_DIM}}, {{BG}}, {{LETTERBOX_H}}
    {{FONT_QUOTE}}, {{FONT_CREDIT}}
-->
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    {{FONTS_LINK}}
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: {{BG}}; }
      .letterbox { position: absolute; left: 0; right: 0; height: {{LETTERBOX_H}}px; background: #000; z-index: 50; }
      .letterbox.top { top: 0; } .letterbox.bottom { bottom: 0; }
      .card {
        position: absolute; inset: 0; z-index: 60;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: {{BG}}; color: {{FG}};
      }
      .quote {
        font-family: {{FONT_QUOTE}}, serif;
        font-style: italic; font-weight: 400;
        font-size: 56px; line-height: 1.3;
        text-align: center; max-width: 1400px;
        opacity: 0;
      }
      .attribution {
        display: block;
        font-style: normal; font-size: 24px;
        margin-top: 24px;
        color: {{FG_DIM}};
        letter-spacing: 0.4em; text-transform: uppercase;
      }
      .credits {
        position: absolute; bottom: 130px;
        text-align: center;
        font-family: {{FONT_CREDIT}}, monospace;
        font-size: 16px;
        color: {{FG_DIM}};
        letter-spacing: 0.3em;
        text-transform: uppercase;
        opacity: 0;
      }
      .credits span { display: block; margin: 4px 0; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="{{DURATION}}" data-width="1920" data-height="1080">
      <div class="letterbox top"></div>
      <div class="letterbox bottom"></div>
      <div id="card" class="clip card" data-start="0" data-duration="{{DURATION}}" data-track-index="9">
        <div class="quote" id="quote">
          {{QUOTE}}
          <span class="attribution">{{ATTRIBUTION}}</span>
        </div>
        <div class="credits" id="credits">
          <span>{{CREDIT_1}}</span>
          <span>{{CREDIT_2}}</span>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      const D = {{DURATION}};
      tl.fromTo("#quote", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 1.4, ease: "power2.out" }, 0.3)
        .to("#credits", { opacity: 0.7, duration: 0.8 }, 1.5)
        .to("#card", { opacity: 0, duration: 0.6 }, D - 0.6);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
