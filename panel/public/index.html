<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LoopX Command Center</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a25;
      --border: #2a2a3a;
      --text: #e0e0e8;
      --text-dim: #888899;
      --accent: #f0c040;
      --accent2: #e08030;
      --green: #40c080;
      --red: #e04040;
      --blue: #4080e0;
      --purple: #8040e0;
    }

    body {
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Header */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
    }

    .header .status-bar {
      display: flex;
      gap: 16px;
      font-size: 12px;
      color: var(--text-dim);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }

    .status-dot.online { background: var(--green); }
    .status-dot.offline { background: var(--red); }

    /* Layout */
    .layout {
      display: flex;
      height: calc(100vh - 57px);
    }

    /* Sidebar — Channels */
    .sidebar {
      width: 220px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      padding: 0 16px 8px;
    }

    .channel-item {
      padding: 10px 16px;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .channel-item:hover { background: var(--surface2); }
    .channel-item.active {
      background: var(--surface2);
      border-left-color: var(--accent);
    }

    .channel-item .ch-letter {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      color: var(--bg);
    }

    .ch-E { background: var(--accent); }
    .ch-F { background: var(--green); }
    .ch-G { background: var(--blue); }
    .ch-H { background: var(--purple); }

    .channel-item .ch-name {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Main content */
    .main {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
    }

    /* Channel header */
    .channel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .channel-header h2 {
      font-size: 20px;
      color: var(--text);
    }

    .channel-header .actions {
      display: flex;
      gap: 8px;
    }

    /* Buttons */
    .btn {
      padding: 8px 16px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      font-size: 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      color: var(--bg);
      border-color: var(--accent);
      font-weight: 600;
    }

    .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }

    .btn-sm { padding: 4px 10px; font-size: 11px; }

    /* Jobs list */
    .jobs-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .job-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .job-card:hover { border-color: var(--accent); }
    .job-card.active { border-color: var(--accent); box-shadow: 0 0 20px rgba(240, 192, 64, 0.05); }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .job-title {
      font-size: 14px;
      font-weight: 600;
    }

    .job-status {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 4px;
      font-weight: 600;
    }

    .job-status.pending { background: var(--surface2); color: var(--text-dim); }
    .job-status.running { background: rgba(64, 128, 224, 0.15); color: var(--blue); }
    .job-status.done { background: rgba(64, 192, 128, 0.15); color: var(--green); }
    .job-status.error { background: rgba(224, 64, 64, 0.15); color: var(--red); }

    /* Phase bars */
    .phases {
      display: flex;
      gap: 4px;
    }

    .phase-bar {
      flex: 1;
      height: 6px;
      border-radius: 3px;
      background: var(--surface2);
      overflow: hidden;
      position: relative;
    }

    .phase-bar .fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .phase-bar .fill.pending { width: 0; }
    .phase-bar .fill.running { background: var(--blue); animation: pulse 1.5s infinite; }
    .phase-bar .fill.done { background: var(--green); width: 100%; }
    .phase-bar .fill.error { background: var(--red); width: 100%; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Job detail */
    .job-detail {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-top: 16px;
    }

    .job-detail h3 {
      font-size: 16px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .phase-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .phase-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 12px;
      background: var(--surface2);
      border-radius: 6px;
      font-size: 13px;
    }

    .phase-num {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      background: var(--border);
      color: var(--text-dim);
      flex-shrink: 0;
    }

    .phase-item.done .phase-num { background: var(--green); color: var(--bg); }
    .phase-item.running .phase-num { background: var(--blue); color: white; }
    .phase-item.error .phase-num { background: var(--red); color: white; }

    .phase-info { flex: 1; }
    .phase-name { font-weight: 600; }
    .phase-engine { font-size: 11px; color: var(--text-dim); }

    .phase-progress {
      width: 120px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }

    .phase-progress .bar {
      height: 100%;
      background: var(--blue);
      transition: width 0.3s;
      border-radius: 2px;
    }

    .phase-item.done .phase-progress .bar { background: var(--green); width: 100%; }

    .phase-actions { display: flex; gap: 4px; }

    /* New job modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      display: none;
    }

    .modal-overlay.show { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 400px;
    }

    .modal h3 { margin-bottom: 16px; font-size: 16px; }

    .form-group {
      margin-bottom: 12px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 4px;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 8px 12px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
    }

    .form-group input:focus, .form-group select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    /* Log viewer */
    .log-viewer {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      font-size: 11px;
      line-height: 1.6;
      max-height: 200px;
      overflow-y: auto;
      margin-top: 8px;
      color: var(--text-dim);
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-dim);
    }

    .empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text); }
    .empty-state p { font-size: 13px; margin-bottom: 16px; }

    /* Engine badges */
    .engine-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      font-weight: 600;
      text-transform: uppercase;
    }

    .engine-badge.claude { background: rgba(240, 192, 64, 0.15); color: var(--accent); }
    .engine-badge.ollama { background: rgba(128, 64, 224, 0.15); color: var(--purple); }
    .engine-badge.local { background: rgba(64, 192, 128, 0.15); color: var(--green); }
    .engine-badge.puppeteer { background: rgba(64, 128, 224, 0.15); color: var(--blue); }
    .engine-badge.hetzner { background: rgba(224, 128, 48, 0.15); color: var(--accent2); }
  </style>
</head>
<body>

  <div class="header">
    <h1>LoopX Command Center</h1>
    <div class="status-bar">
      <span><span class="status-dot" id="ollama-dot"></span>Ollama: <span id="ollama-status">checking...</span></span>
      <span><span class="status-dot" id="ws-dot"></span>WS: <span id="ws-status">connecting...</span></span>
      <span id="model-info"></span>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <h2>Canais</h2>
      <div id="channel-list"></div>
    </div>

    <div class="main" id="main-content">
      <div class="empty-state">
        <h3>Seleciona um canal</h3>
        <p>Escolhe um canal na sidebar para ver e gerir episodios.</p>
      </div>
    </div>
  </div>

  <!-- New Job Modal -->
  <div class="modal-overlay" id="modal-new-job">
    <div class="modal">
      <h3>Novo Episodio</h3>
      <div class="form-group">
        <label>Canal</label>
        <select id="new-canal" disabled></select>
      </div>
      <div class="form-group">
        <label>Numero do Episodio</label>
        <input type="number" id="new-episode" placeholder="27">
      </div>
      <div class="form-group">
        <label>Titulo</label>
        <input type="text" id="new-title" placeholder="A MIS 78 ME AGARRO TAN FUERTE...">
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="createJob()">Criar</button>
      </div>
    </div>
  </div>

<script>
// ═══════════════════════════════════════
// State
// ═══════════════════════════════════════
let channels = {};
let jobs = [];
let activeCanal = null;
let activeJobId = null;
let ws = null;

const ENGINE_LABELS = {
  claude: 'Claude',
  ollama: 'LLaMA',
  local: 'Local',
  puppeteer: 'Chrome',
  hetzner: 'Hetzner',
};

// ═══════════════════════════════════════
// API
// ═══════════════════════════════════════
async function api(path, opts) {
  const res = await fetch(`/api${path}`, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
    body: opts?.body ? JSON.stringify(opts.body) : undefined,
  });
  return res.json();
}

// ═══════════════════════════════════════
// WebSocket
// ═══════════════════════════════════════
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => {
    document.getElementById('ws-dot').className = 'status-dot online';
    document.getElementById('ws-status').textContent = 'connected';
  };

  ws.onclose = () => {
    document.getElementById('ws-dot').className = 'status-dot offline';
    document.getElementById('ws-status').textContent = 'disconnected';
    setTimeout(connectWS, 3000);
  };

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleWSMessage(data);
  };
}

function handleWSMessage(data) {
  // Refresh job data on any update
  if (data.jobId) {
    loadJobs(activeCanal);
    if (data.jobId === activeJobId) {
      setTimeout(() => renderJobDetail(activeJobId), 100);
    }
  }
  if (data.type === 'job_created') {
    loadJobs(activeCanal);
  }
}

// ═══════════════════════════════════════
// Init
// ═══════════════════════════════════════
async function init() {
  connectWS();

  // Load channels
  channels = await api('/channels');
  renderChannels();

  // Check Ollama
  const ollamaData = await api('/ollama/status');
  const dot = document.getElementById('ollama-dot');
  const status = document.getElementById('ollama-status');
  const modelInfo = document.getElementById('model-info');

  if (ollamaData.online) {
    dot.className = 'status-dot online';
    status.textContent = 'online';
    modelInfo.textContent = `Model: ${ollamaData.activeModel}`;
  } else {
    dot.className = 'status-dot offline';
    status.textContent = 'offline';
    modelInfo.textContent = 'run: ollama serve';
  }

  // Auto-select Canal E
  if (channels['E']) {
    selectCanal('E');
  }
}

// ═══════════════════════════════════════
// Render — Channels
// ═══════════════════════════════════════
function renderChannels() {
  const list = document.getElementById('channel-list');
  list.innerHTML = '';

  for (const [key, ch] of Object.entries(channels)) {
    const div = document.createElement('div');
    div.className = `channel-item ${activeCanal === key ? 'active' : ''}`;
    div.onclick = () => selectCanal(key);
    div.innerHTML = `
      <div class="ch-letter ch-${key}">${key}</div>
      <div class="ch-name">${ch.name}</div>
    `;
    list.appendChild(div);
  }
}

function selectCanal(canal) {
  activeCanal = canal;
  activeJobId = null;
  renderChannels();
  loadJobs(canal);
}

// ═══════════════════════════════════════
// Render — Jobs
// ═══════════════════════════════════════
async function loadJobs(canal) {
  if (!canal) return;
  jobs = await api(`/jobs?canal=${canal}`);
  renderJobs();
}

function renderJobs() {
  const main = document.getElementById('main-content');
  const ch = channels[activeCanal];

  let html = `
    <div class="channel-header">
      <h2>${ch.name}</h2>
      <div class="actions">
        <button class="btn btn-primary" onclick="openNewJobModal()">+ Novo Episodio</button>
      </div>
    </div>
    <div class="jobs-grid" id="jobs-grid">
  `;

  if (jobs.length === 0) {
    html += `
      <div class="empty-state">
        <h3>Nenhum episodio</h3>
        <p>Cria o primeiro episodio para comecar.</p>
      </div>
    `;
  }

  for (const job of jobs) {
    const isActive = job.id === activeJobId;
    html += `
      <div class="job-card ${isActive ? 'active' : ''}" onclick="selectJob(${job.id})">
        <div class="job-header">
          <span class="job-title">EP${job.episode} — ${job.title || 'Sem titulo'}</span>
          <span class="job-status ${job.status}">${job.status}</span>
        </div>
        <div class="phases">
          ${job.phases.map(p => `
            <div class="phase-bar" title="Fase ${p.phase}: ${p.name}">
              <div class="fill ${p.status}" style="width: ${p.progress || 0}%"></div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  html += '</div>';

  // Job detail
  if (activeJobId) {
    html += renderJobDetailHTML(activeJobId);
  }

  main.innerHTML = html;
}

function selectJob(jobId) {
  activeJobId = activeJobId === jobId ? null : jobId;
  renderJobs();
}

function renderJobDetailHTML(jobId) {
  const job = jobs.find(j => j.id === jobId);
  if (!job) return '';

  return `
    <div class="job-detail">
      <h3>
        EP${job.episode} — ${job.title}
        <div>
          <button class="btn btn-sm" onclick="runFullPipeline(${job.id})">Executar Pipeline</button>
        </div>
      </h3>
      <div class="phase-list">
        ${job.phases.map(p => `
          <div class="phase-item ${p.status}">
            <div class="phase-num">${p.phase}</div>
            <div class="phase-info">
              <div class="phase-name">${p.name}</div>
              <div class="phase-engine">
                <span class="engine-badge ${p.engine}">${ENGINE_LABELS[p.engine] || p.engine}</span>
              </div>
            </div>
            <div class="phase-progress">
              <div class="bar" style="width: ${p.progress || 0}%"></div>
            </div>
            <div class="phase-actions">
              ${p.status !== 'done' && p.status !== 'running' ? `<button class="btn btn-sm" onclick="event.stopPropagation(); runPhase(${job.id}, ${p.phase})">Run</button>` : ''}
              ${p.log ? `<button class="btn btn-sm" onclick="event.stopPropagation(); toggleLog(${job.id}, ${p.phase})">Log</button>` : ''}
            </div>
          </div>
          ${p._showLog ? `<div class="log-viewer">${escapeHtml(p.log)}</div>` : ''}
        `).join('')}
      </div>
    </div>
  `;
}

function renderJobDetail(jobId) {
  loadJobs(activeCanal);
}

// ═══════════════════════════════════════
// Actions
// ═══════════════════════════════════════
async function runFullPipeline(jobId) {
  await api(`/jobs/${jobId}/run`, { method: 'POST', body: {} });
}

async function runPhase(jobId, phase) {
  await api(`/jobs/${jobId}/phase/${phase}`, { method: 'POST', body: {} });
}

function toggleLog(jobId, phase) {
  const job = jobs.find(j => j.id === jobId);
  if (!job) return;
  const p = job.phases.find(ph => ph.phase === phase);
  if (p) p._showLog = !p._showLog;
  renderJobs();
}

// ═══════════════════════════════════════
// Modal
// ═══════════════════════════════════════
function openNewJobModal() {
  const select = document.getElementById('new-canal');
  select.innerHTML = '';
  for (const [key, ch] of Object.entries(channels)) {
    const opt = document.createElement('option');
    opt.value = key;
    opt.textContent = `${key} — ${ch.name}`;
    if (key === activeCanal) opt.selected = true;
    select.appendChild(opt);
  }
  select.disabled = true;
  document.getElementById('new-episode').value = '';
  document.getElementById('new-title').value = '';
  document.getElementById('modal-new-job').classList.add('show');
  document.getElementById('new-episode').focus();
}

function closeModal() {
  document.getElementById('modal-new-job').classList.remove('show');
}

async function createJob() {
  const canal = document.getElementById('new-canal').value;
  const episode = parseInt(document.getElementById('new-episode').value);
  const title = document.getElementById('new-title').value;

  if (!episode) return alert('Numero do episodio obrigatorio');
  if (!title) return alert('Titulo obrigatorio');

  await api('/jobs', { method: 'POST', body: { canal, episode, title } });
  closeModal();
  loadJobs(canal);
}

// ═══════════════════════════════════════
// Utils
// ═══════════════════════════════════════
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Go!
init();
</script>
</body>
</html>
